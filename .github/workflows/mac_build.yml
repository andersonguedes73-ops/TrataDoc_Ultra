name: Build TrataDoc for Mac

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download pt_core_news_md
        pip install pyinstaller

    - name: Gerar Executável com PyInstaller
      run: |
        # Este comando descobre onde o spacy instalou o modelo
        SPACY_MODEL_PATH=$(python -c "import pt_core_news_md; import os; print(os.path.dirname(pt_core_news_md.__file__))")
        
        pyinstaller --noconfirm --onedir --windowed \
        --icon="icone.icns" \
        --add-data "$SPACY_MODEL_PATH:pt_core_news_md" \
        --add-data "icone.png:." \
        --add-data "haarcascade_frontalface_default.xml:." \
        "TrataDoc_ultra.py"

    - name: Upload do Binário
      uses: actions/upload-artifact@v4
      with:
        name: TrataDoc-Mac
        path: dist/TrataDoc_ultra
