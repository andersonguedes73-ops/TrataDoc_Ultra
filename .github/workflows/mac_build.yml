name: Build TrataDoc for Mac

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4  # Atualizado para v4

    - name: Configurar Python
      uses: actions/setup-python@v5 # Atualizado para v5 (mais recente)
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download pt_core_news_md
        pip install pyinstaller

    - name: Gerar Executável com PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed \
        --icon="icone.icns" \
        --add-data "pt_core_news_md:pt_core_news_md" \
        --add-data "icone.png:." \
        --add-data "haarcascade_frontalface_default.xml:." \
        "TrataDoc_ultra.py"

    - name: Upload do Binário
      uses: actions/upload-artifact@v4  # Atualizado para v4
      with:
        name: TrataDoc-Mac
        path: dist/TrataDoc_ultra
